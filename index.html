<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ═══════════════════════════════════════════════════
       BASIC SEO
       These tell Google what your site is about and who
       should see it in search results.
  ════════════════════════════════════════════════════ -->
  <title>AMG Tech – Mobile Apps, Web & Digital Solutions</title>
  <meta name="description" content="AMG Tech is an Egyptian software company specializing in mobile app development, web platforms, ERP & CRM systems, digital marketing, and automation solutions." />
  <meta name="keywords" content="AMG Tech, mobile app development Egypt, web development Egypt, Flutter apps, ERP systems, digital marketing, software company Egypt" />
  <meta name="author" content="AMG Tech" />

  <!-- Tell Google the official URL of this page (prevents duplicate content issues
       between amgtech.tech, www.amgtech.tech, and amg-tech.vercel.app) -->
  <link rel="canonical" href="https://amgtech.tech/" />

  <!-- ═══════════════════════════════════════════════════
       OPEN GRAPH (og:)
       Controls how your link looks when shared on
       WhatsApp, LinkedIn, Facebook, Telegram, etc.
       Without this, they show random text and no image.
  ════════════════════════════════════════════════════ -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://amgtech.tech/" />
  <meta property="og:site_name"   content="AMG Tech" />
  <meta property="og:title"       content="AMG Tech – Mobile Apps, Web & Digital Solutions" />
  <meta property="og:description" content="AMG Tech is an Egyptian software company specializing in mobile app development, web platforms, ERP & CRM systems, digital marketing, and automation solutions." />
  <meta property="og:image"       content="https://amgtech.tech/Images/AMG%20TECH%20(1).jpeg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale"      content="en_US" />

  <!-- ═══════════════════════════════════════════════════
       TWITTER / X CARD
       Same idea as Open Graph but for Twitter/X.
  ════════════════════════════════════════════════════ -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="AMG Tech – Mobile Apps, Web & Digital Solutions" />
  <meta name="twitter:description" content="AMG Tech is an Egyptian software company specializing in mobile app development, web platforms, ERP & CRM systems, digital marketing, and automation solutions." />
  <meta name="twitter:image"       content="https://amgtech.tech/Images/AMG%20TECH%20(1).jpeg" />

  <!-- ═══════════════════════════════════════════════════
       FAVICON
       The small icon shown in browser tabs and bookmarks.
       Use a proper .ico or .png — JPEG is not ideal here.
  ════════════════════════════════════════════════════ -->
  <link rel="icon"             type="image/png"  href="/Images/amg_logo.svg" />
  <link rel="apple-touch-icon"                   href="/Images/AMG%20TECH%20(1).jpeg" />

  <!-- ═══════════════════════════════════════════════════
       FONTS
  ════════════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800&family=Nunito:wght@800;900&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════
       STRUCTURED DATA (JSON-LD)
       This is a special format Google reads to understand
       your business details — name, location, contact info,
       services. It can show your info in rich results like
       the knowledge panel on the right side of Google.
  ════════════════════════════════════════════════════ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "AMG Tech",
    "url": "https://amgtech.tech",
    "logo": "https://amgtech.tech/Images/amg_logo.svg",
    "description": "Egyptian software company specializing in mobile app development, web platforms, ERP & CRM systems, digital marketing, and automation solutions.",
    "email": "amgtech.eg@gmail.com",
    "telephone": "+201275835080",
    "foundingDate": "2023",
    "areaServed": "EG",
    "sameAs": [
      "https://www.linkedin.com/company/amg-tech-official/",
      "https://wa.me/201275835080"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+201275835080",
      "contactType": "customer service",
      "availableLanguage": ["Arabic", "English"]
    }
  }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
